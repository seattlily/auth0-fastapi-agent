<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finishing connection…</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container profile">
        <p id="status" class="muted">Finishing connection…</p>
    </div>
    <script>
    (async () => {
        const status = document.getElementById('status');
        // Auth0 sometimes returns connect_code in the URL fragment (#…) and
        // sometimes in the query string (?…) depending on tenant config.
        // Check both.
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
        const search = window.location.search.startsWith('?') ? window.location.search.slice(1) : window.location.search;
        const fragParams = new URLSearchParams(hash);
        const queryParams = new URLSearchParams(search);
        const get = (k) => fragParams.get(k) || queryParams.get(k);
        const connect_code = get('connect_code');
        const state = get('state');
        const fragErr = get('error') || get('error_description');

        if (fragErr) {
            window.location.replace('/connections?error=' + encodeURIComponent(fragErr));
            return;
        }
        if (!connect_code) {
            window.location.replace('/connections?error=' + encodeURIComponent('No connect_code in URL fragment'));
            return;
        }

        try {
            const resp = await fetch('/connections/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ connect_code, state }),
            });
            if (resp.ok) {
                window.location.replace('/connections?success=connected');
            } else {
                let detail = resp.status + ' ' + resp.statusText;
                try { const j = await resp.json(); detail = j.error || detail; } catch (_) {}
                window.location.replace('/connections?error=' + encodeURIComponent(detail));
            }
        } catch (err) {
            window.location.replace('/connections?error=' + encodeURIComponent(err.message));
        }
    })();
    </script>
</body>
</html>
